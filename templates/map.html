{% extends 'base.html' %}
{% block content %}
<script src="https://api-maps.yandex.ru/2.1/?apikey=99899981-04ac-4230-bbda-69c5b06c0d88&lang=ru" type="text/javascript"></script>
<div class="map-container">
    <div id="myMap" style="width: 700px; height: 700px; margin: 50px auto;"></div>
</div>
<div class="draw-controls">
    <button id="newZoneBtn">Новая зона</button>
    <button id="saveZoneBtn" disabled>Сохранить зону</button>
    <button id="cancelEditBtn" disabled>Отмена</button>
</div>
<div id="info">
    <p>Нажмите "Новая зона", затем рисуйте и редактируйте зону на карте.</p>
</div>
<script>
    var myMap;
    var isEditing = false;
    var currentPolygon = null;
    ymaps.ready(init);

    function init() {

        myMap = new ymaps.Map("myMap", {
            center: [53.6775, 23.8341],
            zoom: 13,
            controls: ["zoomControl", "fullscreenControl"]
        });
        document.getElementById('newZoneBtn').onclick = createZone;
        document.getElementById('cancelEditBtn').onclick = cancelEditing;
        loadZones()
    }
    async function loadZones() {
        try {
            const response = await fetch('/get_zones');
            const zones = await response.json();

            zones.forEach(zone => {
                if (zone.coords.length >= 3) {
                    var polygon = new ymaps.Polygon([zone.coords], {
                        hintContent: zone.name,
                    }, {
                        fillColor: zone.color,
                        fillOpacity: 0.2,
                        strokeColor: zone.color,
                        strokeWidth: 2,
                        cursor: 'pointer'

                    });
                    myMap.geoObjects.add(polygon);
                    console.log('Тута');
                };
            });
        }
        catch (error) {
            console.error('Ошибка загрузки зон', error)
        }
    }

    async function createZone() {
        if (isEditing){
            if (confirm('Есть несохраненные зоны. Отменить их?')) {
                cancelEditing();
            }
            else {return;}
        }
        if (currentPolygon) {
            myMap.geoObjects.remove(currentPolygon);
        }
        currentPolygon = new ymaps.Polygon([[
            [53.6775, 23.8341]
            ]], {
                hintContent: "Новая зона"
            }, {
                fillColor: "#2E16B1",
                fillOpacity: 0.3,
                strokeColor: "#180773",
                strokeWidth: 2,
                editorDrawingCursor: 'crosshair',
            }
        );
        myMap.geoObjects.add(currentPolygon);
        currentPolygon.editor.startEditing();
        currentPolygon.isNewZone = true;
        isEditing = true;
        document.getElementById('newZoneBtn').disabled = true;
        document.getElementById('saveZoneBtn').disabled = false;
        document.getElementById('cancelEditBtn').disabled = false;
        document.getElementById('info').innerHTML = '<p>Режим рисования</p>';
    }

    function cancelEditing() {

    }

</script>
{% endblock %}
