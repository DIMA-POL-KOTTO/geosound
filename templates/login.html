{% extends 'base.html' %}
{% block content %}
<form action="" method="POST" class="form-login">
    <div class="container-login">
        <p><label>Имя пользователя: </label><input type="text" name="username" value="" required></p>
        <p><label>Пароль: </label><input type="password" name="password" value="" required></p>
        <p class="submit-btn"><input type="submit" value="Вход"></p>
        <p><a href="{{ url_for('register') }}">Регистрация</a></p>
    </div>
</form>
{% for cat, msg in get_flashed_messages(True) %}
<div class="flash {{cat}}">
    {{msg}}
</div>
{% endfor %}
{% endblock %}
